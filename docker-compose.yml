# AgentForge — Docker Compose
# Self-hosted AI software team platform
#
# Quick start:
#   cp .env.example .env
#   # Fill in your API keys in .env
#   docker compose up
#
# Web dashboard: http://localhost:3000
# API:           http://localhost:3001

name: agentforge

services:

  # ── API server ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    image: agentforge-api:latest
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - agentforge_data:/data/.agentforge
    environment:
      NODE_ENV: production
      PORT: "3001"
      AGENTFORGE_DIR: /data/.agentforge
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Web dashboard (Next.js) ─────────────────────────────────────────────────
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    image: agentforge-web:latest
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "http://localhost:${API_PORT:-3001}"
    depends_on:
      api:
        condition: service_healthy

  # ── CLI runner (for one-off build commands) ─────────────────────────────────
  cli:
    build:
      context: .
      target: cli
    image: agentforge-cli:latest
    profiles:
      - tools
    volumes:
      - agentforge_data:/data/.agentforge
      - ./output:/data/output
    environment:
      NODE_ENV: production
      AGENTFORGE_DIR: /data/.agentforge
    env_file:
      - .env

volumes:
  agentforge_data:
    driver: local
