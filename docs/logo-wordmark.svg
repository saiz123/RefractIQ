<svg width="480" height="120" viewBox="0 0 480 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="wm-glow-green" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wm-glow-blue" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wm-glow-purple" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Icon mark (scaled to fit 120×120 area) ── -->
  <!-- Input beam -->
  <line x1="8" y1="60" x2="41" y2="60"
        stroke="#E6EDF3" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Prism front face -->
  <polygon points="41,19 41,101 84,60" fill="#E6EDF3"/>
  <!-- Prism 3D bottom face -->
  <polygon points="41,101 84,60 87,65 45,105" fill="#8B949E" opacity="0.6"/>

  <!-- Green beam -->
  <line x1="84" y1="60" x2="108" y2="29" stroke="#3FB950" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Blue beam -->
  <line x1="84" y1="60" x2="113" y2="53" stroke="#58A6FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Purple beam -->
  <line x1="84" y1="60" x2="108" y2="90" stroke="#A371F7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Green circle -->
  <circle cx="108" cy="29" r="8" fill="#3FB950" filter="url(#wm-glow-green)"/>
  <!-- Blue circle with checkmark -->
  <circle cx="113" cy="53" r="8" fill="#58A6FF" filter="url(#wm-glow-blue)"/>
  <path d="M109,53 L112,57 L118,49" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Purple circle -->
  <circle cx="108" cy="90" r="8" fill="#A371F7" filter="url(#wm-glow-purple)"/>

  <!-- ── Wordmark: "Refract" white + "IQ" blue ── -->
  <!-- Using system font stack closest to Inter -->
  <text x="136" y="76"
        font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-weight="700"
        font-size="52"
        letter-spacing="-1.5"
        fill="#E6EDF3">Refract</text>
  <text x="352" y="76"
        font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-weight="700"
        font-size="52"
        letter-spacing="-1"
        fill="#58A6FF">IQ</text>
</svg>
