<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow filters for colored circles -->
    <filter id="glow-green" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle prism shadow -->
    <filter id="prism-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" fill="#0D1117" rx="76"/>

  <!-- Input beam — white horizontal ray entering from left -->
  <line x1="34" y1="256" x2="175" y2="256"
        stroke="#E6EDF3" stroke-width="4.5" stroke-linecap="round" opacity="0.92"/>

  <!-- ── Prism ── -->
  <!-- Main front face: bright white, triangular, apex pointing right -->
  <polygon
    points="175,82 175,430 358,256"
    fill="#E6EDF3"
    filter="url(#prism-shadow)"/>

  <!-- 3D bottom face: darker gray parallelogram showing depth -->
  <polygon
    points="175,430 358,256 372,274 192,446"
    fill="#8B949E"
    opacity="0.65"/>

  <!-- Prism top-edge subtle highlight line -->
  <line x1="175" y1="82" x2="358" y2="256"
        stroke="#F0F6FF" stroke-width="1.5" opacity="0.5"/>

  <!-- ── Output beams from apex (358, 256) ── -->

  <!-- Green beam — upper right, ~50° above horizontal -->
  <line x1="358" y1="256" x2="454" y2="118"
        stroke="#3FB950" stroke-width="4" stroke-linecap="round"/>

  <!-- Blue beam — middle right, ~12° above horizontal -->
  <line x1="358" y1="256" x2="468" y2="224"
        stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>

  <!-- Purple beam — lower right, ~48° below horizontal -->
  <line x1="358" y1="256" x2="452" y2="386"
        stroke="#A371F7" stroke-width="4" stroke-linecap="round"/>

  <!-- ── Endpoint circles ── -->

  <!-- Green circle -->
  <circle cx="454" cy="118" r="26" fill="#3FB950" filter="url(#glow-green)"/>

  <!-- Blue circle with checkmark -->
  <circle cx="468" cy="224" r="26" fill="#58A6FF" filter="url(#glow-blue)"/>
  <!-- White checkmark (verification style) -->
  <path d="M456,224 L464,233 L481,214"
        stroke="white" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- Purple circle -->
  <circle cx="452" cy="386" r="26" fill="#A371F7" filter="url(#glow-purple)"/>

</svg>
