<svg xmlns="http://www.w3.org/2000/svg" viewBox="130 55 380 195" width="380" height="195" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="prismGradIcon" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#F4F6FA"/>
      <stop offset="0.55" stop-color="#E2E7EC"/>
      <stop offset="1" stop-color="#CFD6DE"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="130" y="55" width="380" height="195" fill="#0D1117"/>

  <!-- input beam -->
  <line x1="150" y1="156" x2="231" y2="156" stroke="#E9ECF0" stroke-width="11" stroke-linecap="round"/>

  <!-- output beams -->
  <line x1="313" y1="137" x2="461" y2="79"  stroke="#3FB950" stroke-width="9" stroke-linecap="round"/>
  <line x1="320" y1="150" x2="484" y2="141" stroke="#58A6FF" stroke-width="9" stroke-linecap="round"/>
  <line x1="340" y1="167" x2="476" y2="202" stroke="#A371F7" stroke-width="9" stroke-linecap="round"/>

  <!-- prism -->
  <path d="M289 66 L217 221 L292 235 L369 197 L330 129 Z
           M289 92 L271 224 L232 213 Z"
        fill="url(#prismGradIcon)" fill-rule="evenodd"
        stroke="url(#prismGradIcon)" stroke-width="3" stroke-linejoin="round"/>

  <!-- dots -->
  <circle cx="462" cy="79"  r="14" fill="#3FB950"/>
  <circle cx="485" cy="141" r="21" fill="#58A6FF"/>
  <circle cx="476" cy="203" r="17" fill="#A371F7"/>
  <!-- checkmark -->
  <path d="M476 142 L483 150 L497 130" fill="none" stroke="#FFFFFF" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
